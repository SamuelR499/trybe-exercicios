<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>formulario</title>
    <!-- CSS only -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>Header da pagina</h1>
    </header>
    <form class="First forms" action="">
        <fieldset id="conteudo">
            <div class=" mb-3">
                <label for="nome-usuario" class="form-label">Nome:</label>
                <input class="form-control" type="text" name="login" id="nomeUsuario" minlength="10" maxlength="40">
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">Email: </label>
                <input type="email" name="login" id="email" minlength="10" maxlength="50" placeholder="name@example.com"
                    class="form-control">
            </div>
            <div class="mb-3">
                <input type="radio" name="destino-preferido" id="cidade">
                <label for="cidade">Cidade</label>
                <input type="radio" name="destino-preferido" id="campo">
                <label for="campo">Campo</label>
                <input type="radio" name="destino-preferido" id="praia">
                <label for="praia">Praia</label>
                <input type="radio" name="destino-preferido" id="montanhas">
                <label for="montanhas">Montanhas</label>
            </div>
            <div class="mb-3">
                <label for="porque">Por que você deveria ser a pessoa desenvolvedora a ganhar o concurso
                    TrybeTrip?</label>
                <textarea name="porque" id="porque" cols="30" rows="10" maxlength="500"></textarea>
            </div>
            <div class="mb-3">
                <label for="data">Qual a melhor data para realizar sua viagem?</label>
                <input type="date" id="data">
            </div>
            <div class="mb-3">
                <input type="checkbox" name="concordo1" id="concordo1">
                <label for="concordo1">Gostaria de receber outras incríveis oportunidades oferecidas pela Trybe?</label>
            </div>
            <div class="mb-3">
                <input type="checkbox" name="concordo2" id="concordo2">
                <label for="concordo2">Concordo que imagens das minhas férias poderão ser usadas na divulgação de
                    concursos futuros.</label>
            </div>
        </fieldset>
        <div>
            <button>Enviar</button>
            <button>Apagar</button>
        </div>
    </form>
    <script src="script.js"></script>
</body>

</html>
